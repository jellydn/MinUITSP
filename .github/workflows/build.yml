name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  # ---------------------------------------------------------------------------
  # Phase 1a: Build trimuismart (TSP model S) toolchain and cross-compile
  # ---------------------------------------------------------------------------
  build-trimuismart:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Cache trimuismart toolchain
        uses: actions/cache@v5
        with:
          path: /tmp/toolchain-trimuismart.tar
          key: toolchain-trimuismart-${{ hashFiles('workspace/trimuismart/makefile') }}
          restore-keys: |
            toolchain-trimuismart-

      - name: Clone and build toolchain
        run: |
          git clone --depth 1 https://github.com/jellydn/union-trimuismart-toolchain/ toolchains/trimuismart-toolchain
          cd toolchains/trimuismart-toolchain
          make .build

      - name: Cross-compile
        run: |
          make -f makefile.toolchain ci-build PLATFORM=trimuismart

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build-trimuismart
          path: workspace/
          retention-days: 3

  # ---------------------------------------------------------------------------
  # Phase 1b: Build tg5040 (TSP/Brick) toolchain and cross-compile
  # ---------------------------------------------------------------------------
  build-tg5040:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Cache tg5040 toolchain
        uses: actions/cache@v5
        with:
          path: /tmp/toolchain-tg5040.tar
          key: toolchain-tg5040-${{ hashFiles('workspace/tg5040/makefile') }}
          restore-keys: |
            toolchain-tg5040-

      - name: Clone and build toolchain
        run: |
          git clone --depth 1 https://github.com/jellydn/union-tg5040-toolchain/ toolchains/tg5040-toolchain
          cd toolchains/tg5040-toolchain
          make .build

      - name: Cross-compile
        run: |
          make -f makefile.toolchain ci-build PLATFORM=tg5040

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build-tg5040
          path: workspace/
          retention-days: 3

  # ---------------------------------------------------------------------------
  # Phase 2: Package release ZIPs
  # ---------------------------------------------------------------------------
  package:
    needs: [build-trimuismart, build-tg5040]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Download trimuismart build artifacts
        uses: actions/download-artifact@v7
        with:
          name: build-trimuismart
          path: workspace-trimuismart/

      - name: Download tg5040 build artifacts
        uses: actions/download-artifact@v7
        with:
          name: build-tg5040
          path: workspace-tg5040/

      - name: Merge workspace directories
        run: |
          cp -r workspace-trimuismart/* workspace/ 2>/dev/null || true
          cp -r workspace-tg5040/* workspace/ 2>/dev/null || true

      - name: Build skeleton
        run: make setup

      - name: Build system (trimuismart)
        run: |
          make system
          make cores

      - name: Populate tg5040 system
        run: |
          cp ./workspace/tg5040/keymon/keymon.elf ./build/SYSTEM/tg5040/bin/
          cp ./workspace/tg5040/libmsettings/libmsettings.so ./build/SYSTEM/tg5040/lib/ 2>/dev/null || true
          cp ./workspace/all/minui/build/tg5040/minui.elf ./build/SYSTEM/tg5040/bin/
          cp ./workspace/all/minarch/build/tg5040/minarch.elf ./build/SYSTEM/tg5040/bin/
          cp ./workspace/all/syncsettings/build/tg5040/syncsettings.elf ./build/SYSTEM/tg5040/bin/
          cp ./workspace/all/say/build/tg5040/say.elf ./build/SYSTEM/tg5040/bin/
          cp ./workspace/tg5040/show/show.elf ./build/SYSTEM/tg5040/bin/
          # tg5040 cores
          cp ./workspace/tg5040/cores/output/fceumm_libretro.so ./build/SYSTEM/tg5040/cores
          cp ./workspace/tg5040/cores/output/gambatte_libretro.so ./build/SYSTEM/tg5040/cores
          cp ./workspace/tg5040/cores/output/gpsp_libretro.so ./build/SYSTEM/tg5040/cores
          cp ./workspace/tg5040/cores/output/picodrive_libretro.so ./build/SYSTEM/tg5040/cores
          cp ./workspace/tg5040/cores/output/snes9x2005_plus_libretro.so ./build/SYSTEM/tg5040/cores
          cp ./workspace/tg5040/cores/output/pcsx_rearmed_libretro.so ./build/SYSTEM/tg5040/cores
          # tg5040 extras
          cp ./workspace/tg5040/cores/output/mgba_libretro.so ./build/EXTRAS/Emus/tg5040/MGBA.pak
          cp ./workspace/tg5040/cores/output/mgba_libretro.so ./build/EXTRAS/Emus/tg5040/SGB.pak
          cp ./workspace/tg5040/cores/output/mednafen_pce_fast_libretro.so ./build/EXTRAS/Emus/tg5040/PCE.pak
          cp ./workspace/tg5040/cores/output/pokemini_libretro.so ./build/EXTRAS/Emus/tg5040/PKM.pak
          cp ./workspace/tg5040/cores/output/race_libretro.so ./build/EXTRAS/Emus/tg5040/NGP.pak
          cp ./workspace/tg5040/cores/output/race_libretro.so ./build/EXTRAS/Emus/tg5040/NGPC.pak
          cp ./workspace/tg5040/cores/output/mednafen_supafaust_libretro.so ./build/EXTRAS/Emus/tg5040/SUPA.pak
          cp ./workspace/tg5040/cores/output/mednafen_vb_libretro.so ./build/EXTRAS/Emus/tg5040/VB.pak || true
          cp ./workspace/tg5040/cores/output/fbneo_libretro.so ./build/EXTRAS/Emus/tg5040/FBN.pak || true
          cp ./workspace/tg5040/cores/output/fake08_libretro.so ./build/EXTRAS/Emus/tg5040/P8.pak || true

      - name: Finalize package
        run: |
          make special
          make tidy
          make package

      - name: Upload release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release
          path: releases/
          retention-days: 5

  # ---------------------------------------------------------------------------
  # Phase 3: Create GitHub Release (tag pushes only)
  # ---------------------------------------------------------------------------
  release:
    needs: package
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Checkout for git context
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download release artifacts
        uses: actions/download-artifact@v7
        with:
          name: release
          path: releases/

      - name: List release files
        run: ls -lh releases/

      - name: Create GitHub Release with gh CLI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"

          NOTES="## MinUI for TrimUI Smart Pro ${TAG}\n\n"
          NOTES+="### Installation\n"
          NOTES+="1. Download the base ZIP below\n"
          NOTES+="2. Extract and copy \`MinUI.zip\` to your SD card root\n"
          NOTES+="3. Power on your device -- MinUI will install automatically\n\n"

          gh release create "$TAG" \
            releases/*.zip \
            --title "MinUI for TSP ${TAG}" \
            --notes "$(echo -e "$NOTES")"

          echo "Release created: https://github.com/${{ github.repository }}/releases/tag/${TAG}"
