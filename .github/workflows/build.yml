name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  # ---------------------------------------------------------------------------
  # Phase 1: Build toolchain and cross-compile cores
  # ---------------------------------------------------------------------------
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache toolchain Docker image
        uses: actions/cache@v4
        with:
          path: /tmp/toolchain-trimuismart.tar
          key: toolchain-trimuismart-${{ hashFiles('workspace/trimuismart/makefile') }}
          restore-keys: |
            toolchain-trimuismart-

      - name: Clone and build toolchain
        run: |
          git clone --depth 1 https://github.com/jellydn/union-trimuismart-toolchain/ toolchains/trimuismart-toolchain
          cd toolchains/trimuismart-toolchain
          make .build

      - name: Cross-compile
        run: |
          make -f makefile.toolchain ci-build PLATFORM=trimuismart

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: workspace/trimuismart/cores/output/
          retention-days: 3

  # ---------------------------------------------------------------------------
  # Phase 2: Package release ZIPs
  # ---------------------------------------------------------------------------
  package:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build
          path: workspace/trimuismart/cores/output/

      - name: Build skeleton
        run: make setup

      - name: Build system
        run: |
          make system
          make cores

      - name: Finalize package
        run: |
          make special
          make tidy
          make package

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release
          path: releases/
          retention-days: 5

  # ---------------------------------------------------------------------------
  # Phase 3: Create GitHub Release (tag pushes only)
  # ---------------------------------------------------------------------------
  release:
    needs: package
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: release
          path: releases/

      - name: List release files
        run: ls -lh releases/

      - name: Create GitHub Release with gh CLI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"

          NOTES="## MinUI for TrimUI Smart Pro ${TAG}\n\n"
          NOTES+="### Installation\n"
          NOTES+="1. Download the base ZIP below\n"
          NOTES+="2. Extract and copy \`MinUI.zip\` to your SD card root\n"
          NOTES+="3. Power on your device -- MinUI will install automatically\n\n"

          gh release create "$TAG" \
            releases/*.zip \
            --title "MinUI for TSP ${TAG}" \
            --notes "$(echo -e "$NOTES")"

          echo "Release created: https://github.com/${{ github.repository }}/releases/tag/${TAG}"
